    <!-- Tailwind CSS CDN -->

    <style>

<body class="min-h-screen flex items-center justify-center p-6">


    <div id="movies">

    </div>

    <button class="bg-red-500" onclick="updateMovies()">update</button>

    <script>

        const movies = ["movies1", "movies2"]
        const element = document.getElementById("movies")
        element.innerText = movies


        function updateMovies() {

            movies.push("movesi3")
            console.log("updated moveise", movies)
            element.innerText = movies

        }
    </script>
